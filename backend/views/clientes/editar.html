<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEP Gym</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- folha de estilos CSS -->
    <link rel="shortcut icon" href="../../assets/img/gym125.png" type="image/png">
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/app.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">
        <div>
            <!-- Logo e Nome -->
            <a href="../../index.html">
                <img src="../../assets/images/gym125_white.png" alt="Logo do ISEP Ginásio" height="50">
            </a>
            <h3>ISEP Ginásio</h3>
        </div>
        <div>
            <button>Utilizador</button>
        </div>
    </header>
    <!-- Sidebar -->
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 bg-secondary text-white p-3 min-vh-100">
                <h4>Menu</h4>
                <nav>
                    <a href="../clientes/lista.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i></i> Clientes
                    </a>
                    <a href="../agendamento/agendamento.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i></i> Agendamento de treinos
                    </a>
                    <a href="../planos/planos.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i></i> Planos de Treino
                    </a>
                    <a href="../equipamentos/equipamentos.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i></i> Equipamentos
                    </a>
                    <a href="../produtos-servicos/produtos-servicos.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i></i> Produtos e Serviços
                    </a>
                </nav>
            </aside>
            <!-- Conteúdo Principal -->
            <main class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-center mt-4">
                    <div class="card w-100 shadow rounded" style="max-width: 1200px;">
                        <div class="card-body">
                            <h2 class="mb-4"><strong><i class="fa-solid fa-pen-to-square me-2"></i> Atualização de Dados
                                    CLIENTES</strong></h2>
                            <hr>
                            <form action="#" method="post" novalidate>
                                <!-- Linhas e colunas com campos organizados -->
                                <div class="row mb-3">
                                    <div class="col-12">
                                        <label for="texto_nome" class="form-label">Nome Completo</label>
                                        <input type="text" class="form-control" id="texto_nome" name="nome_cliente"
                                            value="Ana Beatriz Ferreira" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-12">
                                        <label for="texto_endereco" class="form-label">Morada <small>(NºPorta,
                                                Andar)</small></label>
                                        <input type="text" class="form-control" id="texto_endereco"
                                            name="morada_cliente" value="Avenida de Portugal, 123" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3">
                                        <label for="texto_cp" class="form-label">Código Postal</label>
                                        <input type="text" class="form-control" id="texto_cp" name="cp_cliente"
                                            value="1234-567" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="texto_cidade" class="form-label">Cidade</label>
                                        <input type="text" class="form-control" id="texto_cidade" name="cid_cliente"
                                            value="Lisboa" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="texto_cliente" class="form-label">Telefone</label>
                                        <input type="text" class="form-control" id="texto_cliente" name="tel_cliente"
                                            value="123456789" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="texto_email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="texto_email" name="email_cliente"
                                            value="ana.beatriz@example.com" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Sexo</label>
                                        <div>
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="radio" name="radio_gender"
                                                    id="radio_m" value="m">
                                                <label class="form-check-label" for="radio_m">Masculino</label>
                                            </div>
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="radio" name="radio_gender"
                                                    id="radio_f" value="f" checked>
                                                <label class="form-check-label" for="radio_f">Feminino</label>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="texto_dnasc" class="form-label">Data de nascimento</label>
                                        <input type="text" class="form-control" id="texto_dnasc" name="dnasc_cliente"
                                            value="1990-01-01" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label for="texto_estcivil" class="form-label">Estado Civil</label>
                                        <select class="form-select" id="texto_estcivil" name="estaciv_cliente">
                                            <option selected>Escolha uma opção</option>
                                            <option value="solt">Solteiro</option>
                                            <option value="casd" selected>Casado</option>
                                            <option value="ufat">União de Facto</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="texto_SSaude" class="form-label">Sistema de Saúde</label>
                                        <input type="text" class="form-control" id="texto_SSaude" name="campo_opcao"
                                            list="sistemasaude" value="ADSE">
                                        <datalist id="sistemasaude">
                                            <option value="SNS">
                                            <option value="ADSE">
                                            <option value="SMAS">
                                            <option value="CTT">
                                            <option value="PSP">
                                        </datalist>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="profissao" class="form-label">Profissão</label>
                                        <input type="text" class="form-control" id="profissao" name="profissao_cliente" value="Analista de Sistemas" required>
                                    </div>
                                </div>
                                <!-- Botões -->
                                <div class="d-flex justify-content-end gap-2 mb-4">
                                    <a href="lista.html" class="btn btn-outline-secondary">
                                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fa-regular fa-floppy-disk me-1"></i> Guardar
                                    </button>
                                </div>
                                <!-- Área de erros -->
                                <div class="alert alert-danger text-center" role="alert">
                                    • Erro
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
